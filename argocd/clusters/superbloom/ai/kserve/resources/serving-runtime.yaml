apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: vllm
spec:
  annotations:
    prometheus.kserve.io/port: "8080"
    prometheus.kserve.io/path: "/metrics"
  supportedModelFormats:
    - name: vllm
      version: "1"
      autoSelect: true
      priority: 1
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:cu130-nightly
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      # Per-InferenceService args (weights live under /tank/models/<name>/).
      # `/tank/models` is the ZFS dataset on the superbloom host — the same
      # path Nexus download Jobs write to (see k8s-adapter.ts MODELS_DIR).
      # Additional runtime flags (tp size, gpu mem utilization, tool-call parser,
      # etc.) are provided per-model by the InferenceService.spec.predictor.model
      # resource rendered by Nexus.
      args:
        - --model=/tank/models/{{.Name}}
        - --served-model-name={{.Name}}
        - --trust-remote-code
        - --host=0.0.0.0
        - --port=8080
        - --kv-cache-dtype=fp8
        - --enable-prefix-caching
        - --attention-backend=flashinfer
        - --enable-auto-tool-choice
      env:
        - name: VLLM_MARLIN_USE_ATOMIC_ADD
          value: "1"
        # Pre-downloaded weights are on disk; disable HF network lookups.
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: TRANSFORMERS_OFFLINE
          value: "1"
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        limits:
          nvidia.com/gpu: "1"
        requests:
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: nas-models
          mountPath: /tank/models
          readOnly: true
  volumes:
    - name: nas-models
      hostPath:
        path: /tank/models
        type: Directory
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoExecute
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  nodeSelector:
    nvidia.com/gpu.product: NVIDIA-GB10
