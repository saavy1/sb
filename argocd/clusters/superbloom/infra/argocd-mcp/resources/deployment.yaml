apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-mcp-server
  namespace: hermes
  labels:
    app.kubernetes.io/name: argocd-mcp-server
    app.kubernetes.io/part-of: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-mcp-server
        app.kubernetes.io/part-of: hermes
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: argocd-mcp-server
          image: quay.io/argoprojlabs/mcp-for-argocd:latest
          imagePullPolicy: Always
          args:
            - node
            - dist/index.js
            - http
            - --stateless
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: ARGOCD_BASE_URL
              value: http://argocd-server.argocd.svc.cluster.local
            - name: ARGOCD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-env
                  key: ARGOCD_API_TOKEN
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
