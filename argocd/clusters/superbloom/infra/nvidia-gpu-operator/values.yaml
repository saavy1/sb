# DGX Spark has pre-installed drivers and container toolkit
driver:
  enabled: false

toolkit:
  enabled: false

# Operator pod + jobs run on superbloom (has working pod networking)
operator:
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists

# NFD worker needs to run on GX10 to discover the GPU
node-feature-discovery:
  worker:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Equal
        value: ""
        effect: NoSchedule
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoExecute

# DaemonSets (device plugin, etc.) target GPU nodes only
daemonsets:
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoExecute
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: Exists
