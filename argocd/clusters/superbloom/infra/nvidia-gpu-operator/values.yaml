# DGX Spark has pre-installed drivers and container toolkit
driver:
  enabled: false

toolkit:
  enabled: false

# Operator pod + jobs run on superbloom (has working pod networking)
operator:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists

# DaemonSets (device plugin, etc.) target GPU nodes only
daemonsets:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: Exists
