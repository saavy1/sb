cluster:
  name: superbloom

destinations:
  - name: local-prometheus
    type: prometheus
    url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write

  - name: local-loki
    type: loki
    url: http://loki-gateway.monitoring.svc.cluster.local:80/loki/api/v1/push

  - name: local-tempo
    type: otlp
    url: http://tempo.monitoring.svc.cluster.local:4317
    protocol: grpc
    tls:
      insecure: true
    metrics:
      enabled: false
    logs:
      enabled: false
    traces:
      enabled: true

clusterMetrics:
  enabled: true
  kepler:
    enabled: false
  node-exporter:
    enabled: true
    # Tolerate all taints so the DaemonSet runs on every node, including
    # gx10-98a5 which carries a NoExecute nvidia.com/gpu taint. Without the
    # NoExecute toleration the node-exporter pod is evicted and the "Homelab
    # at a Glance" CPU/memory/disk panels only show superbloom.
    tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists
  kube-state-metrics:
    enabled: true

annotationAutodiscovery:
  enabled: false

prometheusOperatorObjects:
  enabled: false

clusterEvents:
  enabled: true

nodeLogs:
  enabled: true

podLogs:
  enabled: true

applicationObservability:
  enabled: true
  receivers:
    otlp:
      grpc:
        enabled: true
        port: 4317
      http:
        enabled: true
        port: 4318
    zipkin:
      enabled: false

autoInstrumentation:
  enabled: false

profiling:
  enabled: false

alloy-metrics:
  enabled: true
  remoteConfig:
    enabled: false

alloy-singleton:
  enabled: true
  remoteConfig:
    enabled: false

alloy-logs:
  enabled: true
  remoteConfig:
    enabled: false

alloy-receiver:
  enabled: true
  remoteConfig:
    enabled: false
  alloy:
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP

alloy-profiles:
  enabled: false
  remoteConfig:
    enabled: false
