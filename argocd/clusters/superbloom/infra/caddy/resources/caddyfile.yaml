apiVersion: v1
kind: ConfigMap
metadata:
  name: caddyfile
  namespace: caddy-system
data:
  Caddyfile: |
    # ---------------------------------------------------------------------------
    # ACCESS PATTERNS:
    #
    # PUBLIC (internet):
    #   1. Add domain to ddns/values.yaml DOMAINS list
    #   2. Add Caddy route below
    #   Example: jellyfin, sonarr, grafana
    #
    # TAILSCALE-ONLY (tailnet):
    #   1. Do NOT add domain to DDNS (keeps it off public DNS)
    #   2. Add Caddy route below (still served, just not publicly resolvable)
    #   3. Access via tailnet: http://<tailscale-ip>:<port>
    #      Or add to /etc/hosts: 100.x.x.x  app.saavylab.dev
    #   Example: hermes
    # ---------------------------------------------------------------------------

    # Global options
    {
        email jayson@saavylab.com
    }

    # Argo CD - uses built-in auth
    argocd.saavylab.dev {
        reverse_proxy argocd-server.argocd.svc.cluster.local:80
    }

    # Hermes Agent - tailnet only (not on public DNS)
    hermes.saavylab.dev {
        reverse_proxy hermes.hermes.svc.cluster.local:80
    }

    # Jellyfin - uses built-in auth
    watch.saavylab.dev {
        reverse_proxy jellyfin.jellyfin.svc.cluster.local:8096
    }

    # Sonarr
    shows.saavylab.dev {
        reverse_proxy sonarr.sonarr.svc.cluster.local:8989
    }

    # Radarr
    movies.saavylab.dev {
        reverse_proxy radarr.radarr.svc.cluster.local:7878
    }

    # SABnzbd
    downloads.saavylab.dev {
        reverse_proxy sabnzbd.sabnzbd.svc.cluster.local:8080
    }

    # Jellyseerr - handles own auth
    fbi.saavylab.dev {
        reverse_proxy jellyseerr.jellyseerr.svc.cluster.local:5055
    }

    # Prowlarr
    indexers.saavylab.dev {
        reverse_proxy prowlarr.prowlarr.svc.cluster.local:9696
    }

    # Bazarr
    subtitles.saavylab.dev {
        reverse_proxy bazarr.bazarr.svc.cluster.local:6767
    }

    # Home Assistant - uses built-in auth
    home.saavylab.dev {
        reverse_proxy home-assistant-main.home-assistant.svc.cluster.local:8123
    }

    # Grafana - uses built-in auth
    grafana.saavylab.dev {
        reverse_proxy kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80
    }

    # Health endpoint
    :80 {
        respond /health 200
    }
