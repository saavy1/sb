apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-model-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/saavy1/sb.git
    targetRevision: main
    path: argocd/clusters/superbloom/infra/model-monitoring/resources
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
