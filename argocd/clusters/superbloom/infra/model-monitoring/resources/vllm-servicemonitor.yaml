apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-predictors
  namespace: monitoring
  labels:
    app.kubernetes.io/name: vllm-predictors
    app.kubernetes.io/part-of: model-monitoring
spec:
  namespaceSelector:
    matchNames:
      - ai
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: homelab-mcp
      component: predictor
  endpoints:
    - path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_service_label_serving_kserve_io_inferenceservice]
          targetLabel: inferenceservice
        - sourceLabels: [__meta_kubernetes_service_label_homelab_saavylab_dev_recipe_id]
          targetLabel: recipe_id
