apiVersion: v1
kind: ConfigMap
metadata:
  name: github-mcp-proxy
  namespace: hermes
  labels:
    app.kubernetes.io/name: github-mcp-server
    app.kubernetes.io/part-of: hermes
data:
  Caddyfile: |
    {
      admin off
      auto_https off
    }

    :8083 {
      reverse_proxy 127.0.0.1:8082 {
        header_up Host "127.0.0.1:8082"
        header_up Authorization "Bearer {$GITHUB_PERSONAL_ACCESS_TOKEN}"
      }
    }
