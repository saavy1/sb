apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-catalog-mcp
  namespace: hermes
  labels:
    app.kubernetes.io/name: model-catalog-mcp
    app.kubernetes.io/part-of: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: model-catalog-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-catalog-mcp
        app.kubernetes.io/part-of: hermes
    spec:
      serviceAccountName: model-catalog-mcp
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: model-catalog-mcp
          image: ghcr.io/saavy1/model-catalog-mcp:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          env:
            - name: PORT
              value: "8080"
            - name: MODEL_CATALOG_RECIPE_DIR
              value: "/etc/model-catalog/recipes"
            - name: MODEL_CATALOG_STATE_NAMESPACE
              value: "hermes"
            - name: MODEL_CATALOG_SPARK_ARENA_DIR
              value: "/etc/model-catalog/spark-arena"
            - name: PROMETHEUS_BASE_URL
              value: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-env
                  key: HF_TOKEN
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: recipes
              mountPath: /etc/model-catalog/recipes
              readOnly: true
            - name: spark-arena-recipes
              mountPath: /etc/model-catalog/spark-arena
              readOnly: true
      volumes:
        - name: recipes
          configMap:
            name: model-catalog-recipes
        - name: spark-arena-recipes
          configMap:
            name: model-catalog-spark-arena-recipes
