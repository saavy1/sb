# Single binary mode - lightweight for single-node cluster
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    retention_period: 168h  # 7 days
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20

memberlist:
  service:
    publishNotReadyAddresses: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi

# Disable components not needed in single binary mode
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Gateway for query routing
gateway:
  enabled: true
  replicas: 1
  nginxConfig:
    logFormat: |-
      main escape=json '{"remote_addr":"$remote_addr","remote_user":"$remote_user","time_local":"$time_local","status":"$status","request":"$request","body_bytes_sent":"$body_bytes_sent","http_referer":"$http_referer","http_user_agent":"$http_user_agent","http_x_forwarded_for":"$http_x_forwarded_for"}';

# Disable canary for single-node homelab — reduces ingestion load and avoids
# rate-limit pressure from canary-push writes
lokiCanary:
  enabled: false

test:
  enabled: false

# Disable chunk cache for single-node
chunksCache:
  enabled: false
resultsCache:
  enabled: false
