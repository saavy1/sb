# Single binary mode - lightweight for single-node cluster
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    retention_period: 24h
    ingestion_rate_mb: 5
    ingestion_burst_size_mb: 10
    max_entries_limit_per_query: 1000
  compactor:
    working_directory: /var/loki/compactor
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    delete_request_store: filesystem

memberlist:
  service:
    publishNotReadyAddresses: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    # Pinned to 10Gi to match the existing StatefulSet's immutable
    # volumeClaimTemplate. Shrinking the PVC renders an immutable-field diff
    # that ArgoCD cannot apply, leaving infra-loki stuck OutOfSync.
    size: 10Gi
  resources:
    requests:
      memory: 512Mi
      cpu: 100m

# Disable components not needed in single binary mode
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Gateway for query routing
gateway:
  enabled: true
  replicas: 1
  nginxConfig:
    logFormat: |-
      main escape=json '{"remote_addr":"$remote_addr","remote_user":"$remote_user","time_local":"$time_local","status":"$status","request":"$request","body_bytes_sent":"$body_bytes_sent","http_referer":"$http_referer","http_user_agent":"$http_user_agent","http_x_forwarded_for":"$http_x_forwarded_for"}';

# Disable canary for single-node homelab — reduces ingestion load and avoids
# rate-limit pressure from canary-push writes
lokiCanary:
  enabled: false

test:
  enabled: false

# Disable chunk cache for single-node
chunksCache:
  enabled: false
resultsCache:
  enabled: false
