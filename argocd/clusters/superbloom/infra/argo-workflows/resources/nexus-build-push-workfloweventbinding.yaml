apiVersion: argoproj.io/v1alpha1
kind: WorkflowEventBinding
metadata:
  name: nexus-build-push-on-main
  namespace: argo
spec:
  event:
    selector: metadata["x-github-event"] == ["push"] && payload.repository.full_name == "saavy1/sb" && payload.ref == "refs/heads/main" && discriminator == "nexus-build-push" && !(payload.head_commit.message startsWith "chore(kargo)")
  submit:
    workflowTemplateRef:
      name: nexus-build-push
    arguments:
      parameters:
        - name: revision
          valueFrom:
            event: payload.after
        # `payload.before` is the commit the ref pointed at BEFORE this push.
        # Passing it through lets check-changes diff the full push range
        # (before..after) instead of just HEAD~1..HEAD, which misses any
        # non-head commits when multiple commits are pushed at once.
        - name: previousRevision
          valueFrom:
            event: payload.before
