apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: nexus-build-push
  namespace: argo
spec:
  serviceAccountName: workflow-runner
  entrypoint: build-push
  arguments:
    parameters:
      - name: revision
        value: main
      - name: repoURL
        value: https://github.com/saavy1/sb.git
      - name: registry
        value: zot.zot.svc.cluster.local:5000
      - name: imageOwner
        value: saavy1
  podGC:
    strategy: OnWorkflowSuccess
  ttlStrategy:
    secondsAfterSuccess: 86400
    secondsAfterFailure: 604800
  templates:
    - name: build-push
      dag:
        tasks:
          - name: check-changes
            template: check-changes
            arguments:
              parameters:
                - name: revision
                  value: "{{workflow.parameters.revision}}"
                - name: repoURL
                  value: "{{workflow.parameters.repoURL}}"
          - name: build-api
            depends: check-changes
            when: "{{tasks.check-changes.outputs.parameters.build-api}} == true"
            template: build-image
            arguments:
              parameters:
                - name: revision
                  value: "{{workflow.parameters.revision}}"
                - name: repoURL
                  value: "{{workflow.parameters.repoURL}}"
                - name: dockerfile
                  value: /workdir/nexus/apps/api/Dockerfile
                - name: image
                  value: "{{workflow.parameters.registry}}/{{workflow.parameters.imageOwner}}/nexus"
          - name: build-bot
            depends: check-changes
            when: "{{tasks.check-changes.outputs.parameters.build-bot}} == true"
            template: build-image
            arguments:
              parameters:
                - name: revision
                  value: "{{workflow.parameters.revision}}"
                - name: repoURL
                  value: "{{workflow.parameters.repoURL}}"
                - name: dockerfile
                  value: /workdir/nexus/apps/bot/Dockerfile
                - name: image
                  value: "{{workflow.parameters.registry}}/{{workflow.parameters.imageOwner}}/nexus-bot"
          - name: build-agent-worker
            depends: check-changes
            when: "{{tasks.check-changes.outputs.parameters.build-agent-worker}} == true"
            template: build-image
            arguments:
              parameters:
                - name: revision
                  value: "{{workflow.parameters.revision}}"
                - name: repoURL
                  value: "{{workflow.parameters.repoURL}}"
                - name: dockerfile
                  value: /workdir/nexus/workers/agent/Dockerfile
                - name: image
                  value: "{{workflow.parameters.registry}}/{{workflow.parameters.imageOwner}}/nexus-agent-worker"
          - name: build-mc-monitor
            depends: check-changes
            when: "{{tasks.check-changes.outputs.parameters.build-mc-monitor}} == true"
            template: build-image
            arguments:
              parameters:
                - name: revision
                  value: "{{workflow.parameters.revision}}"
                - name: repoURL
                  value: "{{workflow.parameters.repoURL}}"
                - name: dockerfile
                  value: /workdir/nexus/workers/mc-monitor/Dockerfile
                - name: image
                  value: "{{workflow.parameters.registry}}/{{workflow.parameters.imageOwner}}/nexus-mc-monitor"
          - name: build-whisper
            depends: check-changes
            when: "{{tasks.check-changes.outputs.parameters.build-whisper}} == true"
            template: build-image
            arguments:
              parameters:
                - name: revision
                  value: "{{workflow.parameters.revision}}"
                - name: repoURL
                  value: "{{workflow.parameters.repoURL}}"
                - name: context
                  value: /workdir/nexus/services/whisper
                - name: dockerfile
                  value: /workdir/nexus/services/whisper/Dockerfile
                - name: image
                  value: "{{workflow.parameters.registry}}/{{workflow.parameters.imageOwner}}/wyoming-openvino-whisper"

    - name: check-changes
      inputs:
        parameters:
          - name: revision
          - name: repoURL
        artifacts:
          - name: source
            path: /workdir
            git:
              repo: "{{inputs.parameters.repoURL}}"
              revision: "{{inputs.parameters.revision}}"
              depth: 2
      container:
        image: oven/bun:1.3.9
        command: [sh, -c]
        args:
          - |
            apt-get update -qq && apt-get install -y -qq git jq > /dev/null 2>&1

            cd /workdir/nexus
            bun install --frozen-lockfile --silent

            # Detect affected turbo packages
            TURBO_SCM_BASE=HEAD~1 TURBO_SCM_HEAD=HEAD \
              bunx turbo ls --affected --output=json 2>/dev/null > /tmp/affected.json || true

            AFFECTED=$(jq -r '.packages.items[].name' /tmp/affected.json 2>/dev/null || echo "")
            echo "=== Affected packages ==="
            echo "$AFFECTED"

            # Check each turbo package
            echo "$AFFECTED" | grep -qx '@nexus/api' && echo true > /tmp/build-api || echo false > /tmp/build-api
            echo "$AFFECTED" | grep -qx '@nexus/bot' && echo true > /tmp/build-bot || echo false > /tmp/build-bot
            echo "$AFFECTED" | grep -qx '@nexus/worker-agent' && echo true > /tmp/build-agent-worker || echo false > /tmp/build-agent-worker
            echo "$AFFECTED" | grep -qx '@nexus/worker-mc-monitor' && echo true > /tmp/build-mc-monitor || echo false > /tmp/build-mc-monitor

            # Whisper is not a turbo workspace — check git diff directly
            cd /workdir
            git diff HEAD~1 --name-only | grep -q '^nexus/services/whisper/' && echo true > /tmp/build-whisper || echo false > /tmp/build-whisper

            echo "api: $(cat /tmp/build-api)"
            echo "bot: $(cat /tmp/build-bot)"
            echo "agent-worker: $(cat /tmp/build-agent-worker)"
            echo "mc-monitor: $(cat /tmp/build-mc-monitor)"
            echo "whisper: $(cat /tmp/build-whisper)"
      outputs:
        parameters:
          - name: build-api
            valueFrom:
              path: /tmp/build-api
          - name: build-bot
            valueFrom:
              path: /tmp/build-bot
          - name: build-agent-worker
            valueFrom:
              path: /tmp/build-agent-worker
          - name: build-mc-monitor
            valueFrom:
              path: /tmp/build-mc-monitor
          - name: build-whisper
            valueFrom:
              path: /tmp/build-whisper

    - name: build-image
      inputs:
        parameters:
          - name: revision
          - name: repoURL
          - name: context
            default: /workdir/nexus
          - name: dockerfile
          - name: image
        artifacts:
          - name: source
            path: /workdir
            git:
              repo: "{{inputs.parameters.repoURL}}"
              revision: "{{inputs.parameters.revision}}"
      container:
        image: moby/buildkit:latest
        env:
          - name: DOCKER_CONFIG
            value: /root/.docker
        command: [sh, -c]
        args:
          - |
            export SOURCE_DATE_EPOCH=$(date +%s)
            buildctl \
              --addr tcp://buildkit.buildkit.svc.cluster.local:1234 \
              build \
              --frontend dockerfile.v0 \
              --local context={{inputs.parameters.context}} \
              --local dockerfile=$(dirname {{inputs.parameters.dockerfile}}) \
              --opt filename=$(basename {{inputs.parameters.dockerfile}}) \
              --output type=image,\"name={{inputs.parameters.image}}:latest,{{inputs.parameters.image}}:{{inputs.parameters.revision}}\",push=true,registry.insecure=true \
              --export-cache type=registry,ref={{inputs.parameters.image}}:cache,mode=max,registry.insecure=true \
              --import-cache type=registry,ref={{inputs.parameters.image}}:cache,registry.insecure=true
        volumeMounts:
          - name: docker-config
            mountPath: /root/.docker
      volumes:
        - name: docker-config
          secret:
            secretName: zot-push
            items:
              - key: .dockerconfigjson
                path: config.json
