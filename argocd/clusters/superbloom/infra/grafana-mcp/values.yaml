fullnameOverride: grafana-mcp-server

image:
  tag: latest
  pullPolicy: Always

grafana:
  url: http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local
  apiKeySecret:
    name: hermes-env
    key: GRAFANA_API_TOKEN

disableWrite: false

podAnnotations:
  saavylab.dev/grafana-token-version: "2026-06-03-1"

extraArgs:
  - -t
  - streamable-http
  - --address
  - :8000
