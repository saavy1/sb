apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-mcp
  namespace: hermes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: kubernetes-mcp
    namespace: hermes
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp
  namespace: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-mcp
  template:
    metadata:
      labels:
        app: kubernetes-mcp
    spec:
      serviceAccountName: kubernetes-mcp
      containers:
        - name: kubernetes-mcp
          image: ghcr.io/containers/kubernetes-mcp-server:v0.0.62
          args:
            - --port
            - "8080"
            - --disable-multi-cluster
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-mcp
  namespace: hermes
spec:
  selector:
    app: kubernetes-mcp
  ports:
    - name: http
      port: 8080
      targetPort: http
