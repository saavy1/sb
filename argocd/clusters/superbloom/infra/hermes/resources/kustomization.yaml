apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - deployment.yaml
  - pvc.yaml
  - external-secret.yaml
  - rbac.yaml

configMapGenerator:
  - name: hermes-config
    files:
      - config.yaml
  - name: hermes-soul
    files:
      - SOUL.md
  - name: mcp-k8s
    files:
      - server.py=mcp-k8s-server.py
  - name: mcp-kserve
    files:
      - server.py=mcp-kserve-server.py
  - name: mcp-grafana
    files:
      - server.py=mcp-grafana-server.py
