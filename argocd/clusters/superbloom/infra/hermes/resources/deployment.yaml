apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      containers:
        - name: hermes
          image: ghcr.io/nousresearch/hermes-agent:latest
          args: ["gateway", "run"]
          envFrom:
            - secretRef:
                name: hermes-env
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: hermes-config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
            - name: hermes-soul
              mountPath: /opt/data/SOUL.md
              subPath: SOUL.md
            - name: docker-sock
              mountPath: /var/run/docker.sock
            - name: mcp-k8s
              mountPath: /opt/mcp/mcp-k8s
            - name: mcp-kserve
              mountPath: /opt/mcp/mcp-kserve
            - name: mcp-grafana
              mountPath: /opt/mcp/mcp-grafana
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: hermes-config
          configMap:
            name: hermes-config
        - name: hermes-soul
          configMap:
            name: hermes-soul
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
        - name: mcp-k8s
          configMap:
            name: mcp-k8s
            defaultMode: 0755
        - name: mcp-kserve
          configMap:
            name: mcp-kserve
            defaultMode: 0755
        - name: mcp-grafana
          configMap:
            name: mcp-grafana
            defaultMode: 0755
