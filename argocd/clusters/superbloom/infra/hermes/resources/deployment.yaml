apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      serviceAccountName: hermes
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"
          envFrom:
            - secretRef:
                name: hermes-env
          ports:
            - containerPort: 9119
              name: dashboard
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: docker-sock
              mountPath: /var/run/docker.sock
            - name: mcp-kserve
              mountPath: /opt/mcp/mcp-kserve
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
        - name: mcp-kserve
          configMap:
            name: mcp-kserve
            defaultMode: 0755
