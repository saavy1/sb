# Fix ArgoCD hook finalizer deadlock on admission webhook RBAC resources
prometheusOperator:
  admissionWebhooks:
    annotations:
      argocd.argoproj.io/hook: PreSync
      argocd.argoproj.io/hook-delete-policy: HookSucceeded

# Grafana - exposed via Caddy reverse proxy
grafana:
  enabled: true
  adminPassword: admin
  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi
  # Skip init-chown-data (fails with local-path provisioner)
  # Instead, use fsGroup to set volume ownership
  initChownData:
    enabled: false
  podSecurityContext:
    fsGroup: 472
    runAsUser: 472
    runAsGroup: 472
  # Datasources auto-configured for local Loki + Tempo
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki-gateway.monitoring.svc.cluster.local:80
      access: proxy
      isDefault: false
      jsonData:
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: '"traceId":"(\w+)"'
            name: TraceID
            url: "$${__value.raw}"
    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo.monitoring.svc.cluster.local:3200
      access: proxy
      isDefault: false
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          filterByTraceID: true
        nodeGraph:
          enabled: true
        serviceMap:
          datasourceUid: prometheus
  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true
  # Provisioned Grafana alert rules — managed as code, read-only in UI.
  # NOTE: Delete any matching UI-configured alerts to avoid duplicates.
  alerting:
    rules.yaml:
      apiVersion: 1
      groups:
        - orgId: 1
          name: Infrastructure Alerts
          folder: Provisioned
          interval: 5m
          rules:
            # Fixed: scoped to external-secrets namespace (was {job=~".+"} scanning ALL logs)
            - uid: external-secrets-sync-failure
              title: External Secrets Sync Failure
              condition: C
              for: 10m
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange:
                    from: 900
                    to: 0
                  datasourceUid: loki
                  model:
                    refId: A
                    expr: 'count_over_time({namespace="external-secrets"} |= "UpdateFailed" [15m])'
                - refId: B
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    refId: B
                    type: reduce
                    expression: A
                    reducer: last
                - refId: C
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    conditions:
                      - evaluator:
                          type: gt
                          params:
                            - 0

  service:
    type: ClusterIP
    port: 80

# Prometheus - metrics storage + scraping
prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    # Accept remote write from Alloy
    enableRemoteWriteReceiver: true
    # Resource limits for single-node
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 2Gi
    # Scrape all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

# Alertmanager - routing disabled until Hermes webhook endpoint is configured
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: "null"
      # TODO: re-enable when Hermes webhook endpoint is ready
      # - name: hermes-webhook
      #   webhook_configs:
      #     - url: http://hermes.hermes.svc.cluster.local:8080/api/webhooks/alertmanager
      #       send_resolved: true

# Alloy owns all metric collection — kube-prometheus-stack is storage + UI + alerting only
nodeExporter:
  enabled: false
kubeStateMetrics:
  enabled: false
kubelet:
  enabled: false
kubeApiServer:
  enabled: false
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeProxy:
  enabled: false
coreDns:
  enabled: false
