controllers:
  main:
    containers:
      main:
        image:
          repository: docker.io/falkordb/falkordb
          tag: latest
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["redis-cli", "ping"]
              initialDelaySeconds: 5
              periodSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["redis-cli", "ping"]
              initialDelaySeconds: 5
              periodSeconds: 5
service:
  main:
    controller: main
    ports:
      redis:
        port: 6379
persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 2Gi
    storageClass: local-path
    globalMounts:
      - path: /data
