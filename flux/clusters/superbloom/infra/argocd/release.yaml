apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: argo-cd
  namespace: flux-system
spec:
  interval: 30m
  url: https://argoproj.github.io/argo-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argocd
  namespace: argocd
spec:
  interval: 5m
  chart:
    spec:
      chart: argo-cd
      version: "9.4.5"
      sourceRef:
        kind: HelmRepository
        name: argo-cd
        namespace: flux-system
  install:
    createNamespace: true
  values:
    global:
      domain: argocd.saavylab.dev
    configs:
      cm:
        url: https://argocd.saavylab.dev
        accounts.hermes-mcp: apiKey
      rbac:
        policy.csv: |
          p, role:hermes-mcp, applications, get, */*, allow
          p, role:hermes-mcp, applications, create, */*, allow
          p, role:hermes-mcp, applications, update, */*, allow
          p, role:hermes-mcp, applications, delete, */*, allow
          p, role:hermes-mcp, applications, sync, */*, allow
          p, role:hermes-mcp, applications, action/*, */*, allow
          p, role:hermes-mcp, clusters, get, *, allow
          p, role:hermes-mcp, logs, get, */*, allow
          p, role:hermes-mcp, projects, get, *, allow
          p, role:hermes-mcp, repositories, get, *, allow
          g, hermes-mcp, role:hermes-mcp
      params:
        server.insecure: true
    server:
      service:
        type: ClusterIP
